name: Dependency Hygiene

on:
  schedule:
    # Каждый понедельник в 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch: # ручной запуск
  pull_request:
    paths:
      - 'pyproject.toml'
      - '.github/workflows/dependency-hygiene.yml'

jobs:
  pip-audit:
    name: pip-audit (CVE scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Install project dependencies
        run: pip install -e ".[dev,mcp]" --quiet

      - name: Run pip-audit (strict, blocking)
        # P1.7: проверка CVE в установленных зависимостях
        # --strict: любой vulnerability → exit 1
        run: |
          echo "=== pip-audit: сканирование установленных зависимостей на CVE ==="
          pip-audit --strict || (
            echo "❌ Найдены vulnerabilities в зависимостях!"
            echo "Обнови vulnerable пакеты или добавь исключения в pyproject.toml"
            exit 1
          )
          echo "✅ pip-audit: vulnerabilities не найдены"

  safety:
    name: safety (vulnerability + license check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install safety
        run: pip install safety

      - name: Install project dependencies
        run: pip install -e ".[dev,mcp]" --quiet

      - name: Run safety scan
        # P1.7: safety проверяет vulnerabilities и license issues
        run: |
          echo "=== safety: сканирование на vulnerabilities ==="
          safety scan --target . --output text || (
            echo "⚠️  Safety нашёл проблемы. Проверь вывод выше."
            # Non-blocking для начала — safety может находить false positives
            # Сделаем blocking когда baseline будет стабильным
            exit 0
          )
          echo "✅ safety: проверка завершена"

  license-check:
    name: License compatibility check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-licenses
        run: pip install pip-licenses

      - name: Install project dependencies
        run: pip install -e ".[dev,mcp]" --quiet

      - name: Check licenses
        # P1.7: проверка что все licenses совместимы с MIT
        # Разрешённые: MIT, Apache-2.0, BSD-2/3-Clause, ISC, MPL-2.0, Python-2.0, Unlicense
        # Запрещённые: GPL, AGPL, LGPL (copyleft), proprietary
        run: |
          echo "=== pip-licenses: проверка совместимости лицензий ==="
          # Вывод всех лицензий
          pip-licenses --format=table --with-urls | head -50
          echo ""
          echo "=== Проверка на запрещённые лицензии ==="
          # Ищем copyleft licenses (GPL, AGPL, LGPL)
          FORBIDDEN=$(pip-licenses --format=json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          forbidden_patterns = ['GPL', 'AGPL', 'LGPL', 'Affero']
          forbidden = []
          for pkg in data:
              license_name = pkg.get('License', '').upper()
              if any(p in license_name for p in forbidden_patterns):
                  forbidden.append(f\"  {pkg['Name']}: {pkg['License']}\")
          if forbidden:
              print('\\n'.join(forbidden))
              sys.exit(1)
          else:
              print('OK')
              sys.exit(0)
          ")
          if [ "$FORBIDDEN" != "OK" ]; then
            echo "❌ Найдены copyleft лицензии (несовместимы с MIT):"
            echo "$FORBIDDEN"
            exit 1
          else
            echo "✅ Все лицензии совместимы с MIT"
          fi

  weekly-report:
    name: Weekly dependency report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: [pip-audit, safety, license-check]
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 Dependency Hygiene weekly report (${date})`,
              body: `Weekly dependency check completed.

            Results:
            - pip-audit: ${{ needs.pip-audit.result }}
            - safety: ${{ needs.safety.result }}
            - license-check: ${{ needs.license-check.result }}

            Action items (if any failures):
            1. Update vulnerable packages
            2. Replace packages with forbidden licenses
            3. Update pyproject.toml with exclusions if needed`,
              labels: ['dependency-hygiene', 'weekly-report']
            });
