name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff + mypy
        run: |
          pip install ruff>=0.5.0 mypy>=1.10

      - name: Check syntax (py_compile)
        run: |
          find scripts src -name "*.py" -exec python3 -m py_compile {} \;

      - name: Ruff lint (errors break CI)
        run: |
          ruff check src/ tests/
        continue-on-error: false

      - name: Ruff lint scripts (warnings only)
        run: |
          ruff check scripts/ --exit-zero
        continue-on-error: true

      - name: Ruff format check
        run: |
          ruff format --check src/ tests/
        # P1.1: убран continue-on-error — форматирование приведено к общему стилю

      - name: Mypy type checking
        run: |
          mypy src/ --config-file pyproject.toml
        continue-on-error: true  # P2.8: 145 ошибок, gradual strict typing

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify version consistency
        run: |
          MANIFEST_VER=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          PYPROJECT_VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          README_VER=$(grep -oP 'version-\K[0-9.]+' README.md | head -1)
          echo "manifest: $MANIFEST_VER, pyproject: $PYPROJECT_VER, readme: $README_VER"
          if [ "$MANIFEST_VER" != "$PYPROJECT_VER" ] || [ "$MANIFEST_VER" != "$README_VER" ]; then
            echo "❌ Version mismatch!"
            exit 1
          fi
          echo "✅ Versions are consistent: $MANIFEST_VER"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          # pytest-benchmark, lxml, hypothesis, Pillow уже в [dev] extras

      - name: Run pytest (unit + integration + e2e + benchmarks)
        run: |
          python3 -m pytest tests/ -v --benchmark-min-rounds=1 --benchmark-warmup=off -k "not IntegrationRealData"

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          # pytest-cov уже в [dev] extras

      - name: Run tests with coverage
        run: |
          python3 -m pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage_html \
            --cov-fail-under=50 \
            -k "not IntegrationRealData and not test_benchmarks and not test_e2e and not test_integration" \
            --benchmark-min-rounds=1 --benchmark-warmup=off

      - name: Coverage summary
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          line_rate = float(root.attrib['line-rate']) * 100
          print(f'📊 Coverage: {line_rate:.2f}%')
          print(f'   Threshold: 50% (target: 85%)')
          if line_rate < 50:
              print('❌ Below threshold!')
              exit(1)
          print('✅ Above threshold')
          "

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage_html/
          retention-days: 14

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          # pytest-benchmark уже в [dev] extras

      - name: Run synthetic benchmarks
        run: |
          # Synthetic benchmarks — работают всегда (не нужны UT11 данные)
          # Используем file:// storage с относительным путём (pytest-benchmark не поддерживает github:// схему)
          mkdir -p .benchmarks
          python3 -m pytest tests/test_benchmarks_synthetic.py \
            --benchmark-only \
            --benchmark-min-rounds=5 \
            --benchmark-warmup=off \
            --benchmark-sort=name \
            --benchmark-storage=file://.benchmarks \
            --benchmark-autosave \
            -v

      - name: Compare with baseline (если есть)
        run: |
          # Сравнение с предыдущим baseline — ловит регрессии
          # Если baseline нет (первый запуск) — шаг не падает
          if [ -d .benchmarks ] && ls .benchmarks/Linux-*/0001_*.json 1>/dev/null 2>&1; then
            python3 -m pytest tests/test_benchmarks_synthetic.py \
              --benchmark-only \
              --benchmark-min-rounds=5 \
              --benchmark-warmup=off \
              --benchmark-compare=0001 \
              --benchmark-compare-fail=mean:30% \
              || echo "⚠️ Есть регрессии >30%"
          else
            echo "ℹ️ Baseline не найден — это первый запуск или storage пустой. Пропускаем compare."
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results
          path: .benchmarks/
          retention-days: 30
