name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install ruff + mypy + pre-commit
        run: |
          pip install "ruff>=0.5.0" "mypy>=1.10" pre-commit
          pip install -e ".[dev,mcp]" --quiet

      - name: Check syntax (py_compile)
        run: |
          find scripts src -name "*.py" -exec python3 -m py_compile {} \;

      - name: MCP tools count sync check (blocking)
        # P1.2: проверка что _get_tools_description() и list_tools handler синхронизированы
        run: |
          python3 scripts/check_mcp_count.py
        continue-on-error: false

      - name: Ruff lint (errors break CI)
        run: |
          ruff check src/ tests/
        continue-on-error: false

      - name: Ruff lint scripts (warnings only)
        run: |
          ruff check scripts/ --exit-zero
        continue-on-error: true

      - name: Ruff format check
        run: |
          ruff format --check src/ tests/
        # P1.1: убран continue-on-error — форматирование приведено к общему стилю

      - name: Mypy type checking (strict, blocking)
        run: |
          mypy src/ --config-file pyproject.toml
        # P0.2: mypy теперь blocking — 0 errors с disallow_untyped_defs для всех модулей

      - name: Pre-commit hooks (all files, non-blocking)
        # P1.5: pre-commit hooks проверяют базовые вещи (whitespace, end-of-file, и т.д.)
        # ruff и mypy уже запущены выше как отдельные шаги
        # Здесь — только pre-commit-hooks (trailing-whitespace, end-of-file-fixer, и т.д.)
        # Non-blocking: если pre-commit что-то меняет, это warning, не error
        # (реальные ошибки ловит ruff check и ruff format --check выше)
        run: |
          pre-commit run --all-files --show-diff-on-failure || true
        env:
          # Пропускаем хуки, которые уже запущены как отдельные шаги
          SKIP: "ruff,ruff-format,mypy,pytest-fast"

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Verify version consistency
        run: |
          MANIFEST_VER=$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")
          PYPROJECT_VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          README_VER=$(grep -oP 'version-\K[0-9.]+' README.md | head -1)
          RP_VER=$(python3 -c "import json; print(json.load(open('.release-please-manifest.json'))['.'])" 2>/dev/null || echo "N/A")
          echo "manifest: $MANIFEST_VER, pyproject: $PYPROJECT_VER, readme: $README_VER, release-please: $RP_VER"
          if [ "$MANIFEST_VER" != "$PYPROJECT_VER" ] || [ "$MANIFEST_VER" != "$README_VER" ]; then
            echo "❌ Version mismatch!"
            exit 1
          fi
          if [ "$RP_VER" != "N/A" ] && [ "$MANIFEST_VER" != "$RP_VER" ]; then
            echo "❌ release-please-manifest.json version mismatch!"
            exit 1
          fi
          echo "✅ Versions are consistent: $MANIFEST_VER"

  complexity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install radon
        run: pip install "radon>=6.0,<7.0"

      - name: Complexity check (block new D+ functions)
        # P0.3: CI gate — блокирует новые функции с complexity ≥ D
        # Существующие D/E/F — технический долг (см. docs/COMPLEXITY_BASELINE.md)
        run: |
          echo "=== Функции с complexity ≥ D (16+) ==="
          radon cc src/ -s -n D || true
          echo ""
          echo "=== Проверка baseline ==="
          # Подсчитаем количество функций с complexity ≥ D
          VIOLATIONS=$(radon cc src/ -n D 2>/dev/null | grep -c "^    [FM] " || echo "0")
          echo "Функций с complexity ≥ D: $VIOLATIONS"
          # Baseline: 14 функций (см. docs/COMPLEXITY_BASELINE.md)
          BASELINE=14
          if [ "$VIOLATIONS" -gt "$BASELINE" ]; then
            echo "❌ Complexity budget violated: $VIOLATIONS > $BASELINE (baseline)"
            echo "Новые функции с complexity ≥ D добавлены. Отрефактори или обнови baseline в docs/COMPLEXITY_BASELINE.md"
            exit 1
          else
            echo "✅ Complexity budget OK: $VIOLATIONS ≤ $BASELINE (baseline)"
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          # pytest-benchmark, lxml, hypothesis, Pillow уже в [dev] extras

      - name: Run pytest (unit + integration + e2e + benchmarks)
        run: |
          python3 -m pytest tests/ -v --benchmark-min-rounds=1 --benchmark-warmup=off -k "not IntegrationRealData"

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          # pytest-cov уже в [dev] extras

      - name: Run tests with coverage
        run: |
          python3 -m pytest tests/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage_html \
            --cov-fail-under=70 \
            -k "not IntegrationRealData and not test_benchmarks and not test_e2e" \
            --benchmark-min-rounds=1 --benchmark-warmup=off

      - name: Coverage summary
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          line_rate = float(root.attrib['line-rate']) * 100
          print(f'📊 Coverage: {line_rate:.2f}%')
          print(f'   Threshold: 50% (target: 85%)')
          if line_rate < 50:
              print('❌ Below threshold!')
              exit(1)
          print('✅ Above threshold')
          "

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: |
            coverage.xml
            coverage_html/
          retention-days: 14

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          # pytest-benchmark уже в [dev] extras

      - name: Run synthetic benchmarks
        run: |
          # Synthetic benchmarks — работают всегда (не нужны UT11 данные)
          # Используем file:// storage с относительным путём (pytest-benchmark не поддерживает github:// схему)
          mkdir -p .benchmarks
          python3 -m pytest tests/test_benchmarks_synthetic.py \
            --benchmark-only \
            --benchmark-min-rounds=5 \
            --benchmark-warmup=off \
            --benchmark-sort=name \
            --benchmark-storage=file://.benchmarks \
            --benchmark-autosave \
            -v

      - name: Compare with baseline (blocking при regression >10%)
        # Этап 6.3: benchmark compare — blocking при regression >10%
        # (было: информационный, не блокирующий, порог 50%)
        # Порог снижен с 50% до 10% для раннего обнаружения regression
        run: |
          if [ -d .benchmarks ] && ls .benchmarks/Linux-*/0001_*.json 1>/dev/null 2>&1; then
            echo "📊 Baseline найдён, запускаем сравнение..."
            python3 -m pytest tests/test_benchmarks_synthetic.py \
              --benchmark-only \
              --benchmark-min-rounds=5 \
              --benchmark-warmup=off \
              --benchmark-compare=0001 \
              --benchmark-compare-fail=mean:10% \
              -v \
              || (echo "❌ Regression >10% detected — CI blocked (Этап 6.3)" && exit 1)
          else
            echo "ℹ️ Baseline не найден — пропускаем compare."
          fi

      - name: Upload benchmark results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: benchmark-results
          path: .benchmarks/
          retention-days: 30
