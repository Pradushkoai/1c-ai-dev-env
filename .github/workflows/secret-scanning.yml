name: Secret Scanning

# S8.6 (2026-07-05): detect-secrets в CI.
# Blocking: если найден новый секрет → CI падает.
# Baseline: .secrets.baseline (существующие false positives помечены как known)
#
# Запуск: на каждый push и pull_request (как ci.yml)

on: [push, pull_request]

jobs:
  detect-secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install detect-secrets
        run: pip install detect-secrets==1.5.0

      - name: Scan for secrets
        # S8.6: проверка на новые секреты (не в baseline)
        # Если найден новый секрет — CI падает
        run: |
          echo "=== Scanning for secrets ==="
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files '^data/|^derived/|^runtime/|^tools/|^download/|^experimental/' \
            . 2>&1 | tee /tmp/scan_results.json

          # Проверяем, есть ли новые секреты (не в baseline)
          NEW_SECRETS=$(python3 -c "
          import json, sys
          with open('/tmp/scan_results.json') as f:
              results = json.load(f)
          new_secrets = results.get('results', {})
          if new_secrets:
              for filename, secrets in new_secrets.items():
                  for s in secrets:
                      print(f'  ❌ {filename}:{s[\"line_number\"]} — {s[\"type\"]}')
              sys.exit(1)
          else:
              print('✅ No new secrets found')
              sys.exit(0)
          ")

          echo "$NEW_SECRETS"

      - name: Verify .env is in .gitignore
        # S8.6: проверка, что .env файл НЕ может быть случайно закоммичен
        run: |
          if git check-ignore .env > /dev/null 2>&1; then
            echo "✅ .env is in .gitignore"
          else
            echo "⚠️  .env is NOT in .gitignore — risk of accidental commit"
            # Non-blocking: .env уже в .gitignore (строка 24), но проверяем
          fi

      - name: Verify .git-credentials is in .gitignore
        run: |
          if git check-ignore .git-credentials > /dev/null 2>&1; then
            echo "✅ .git-credentials is in .gitignore"
          else
            echo "❌ .git-credentials is NOT in .gitignore — CRITICAL"
            exit 1
          fi

      - name: Verify .env.example exists
        # S8.6: .env.example должен существовать как шаблон
        run: |
          if [ -f .env.example ]; then
            echo "✅ .env.example exists"
          else
            echo "❌ .env.example not found — create from template"
            exit 1
          fi
