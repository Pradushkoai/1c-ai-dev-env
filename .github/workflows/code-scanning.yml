name: Code Scanning (SARIF)

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**.py'
      - 'src/**.py'
      - 'tests/**.py'
      - '.github/workflows/code-scanning.yml'
  pull_request:
    paths:
      - 'scripts/**.py'
      - 'src/**.py'
      - 'tests/**.py'

permissions:
  contents: read
  security-events: write  # нужно для загрузки SARIF
  actions: read  # нужно для github/codeql-action/upload-sarif

jobs:
  sarif:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package (без BSL LS — он не нужен для quick уровня)
        run: |
          pip install -e ".[dev]"

      - name: Run 1C analyzers on changed .bsl files
        run: |
          mkdir -p sarif-reports

          # Если в PR — берём изменённые .bsl файлы, иначе — все .bsl в репо
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            BSL_FILES=$(git diff --name-only "$BASE" "$HEAD" -- '*.bsl' || true)
          else
            BSL_FILES=$(find . -name '*.bsl' -not -path './.git/*' || true)
          fi

          # Запускаем SARIF сканер (скрипт вынесен в отдельный файл для читаемости)
          python3 scripts/run_sarif_scan.py "$BSL_FILES" sarif-reports/1c-ai.sarif

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true  # Code Scanning может быть не включен в настройках репо
        with:
          sarif_file: sarif-reports/1c-ai.sarif
          category: 1c-ai-analyzers

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: sarif-report
          path: sarif-reports/1c-ai.sarif
          retention-days: 14
