name: Docker Multi-Arch Build

# I7.1 (2026-07-05): Multi-arch Docker build (amd64 + arm64).
# Apple Silicon разработчики сейчас через Rosetta — это медленно.
# Multi-arch build через docker/build-push-action с buildx.
#
# Запуск: при push тега v* (release) + вручную (workflow_dispatch)
# Публикация: GitHub Container Registry (ghcr.io)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-multi-arch:
    name: Build Multi-Arch Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        # I7.1: QEMU для кросс-компиляции (amd64 → arm64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        # I7.1: buildx для multi-arch builds
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # I7.1: публикация в ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        # I7.1: извлечь версию из тега или pyproject.toml
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build and push (multi-arch)
        # I7.1: сборка для linux/amd64 и linux/arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=1C AI Development Environment
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.licenses=MIT

      - name: Summary
        run: |
          echo "✅ Multi-arch Docker image built and pushed"
          echo "   Registry: ghcr.io/${{ github.repository }}"
          echo "   Tags: latest, ${{ steps.version.outputs.version }}"
          echo "   Platforms: linux/amd64, linux/arm64"
