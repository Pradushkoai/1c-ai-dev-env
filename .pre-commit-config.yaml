# Pre-commit hooks для 1c-ai-dev-env
#
# Установка:
#   pip install pre-commit
#   pre-commit install
#
# Запуск вручную:
#   pre-commit run --all-files
#
# Хуки срабатывают на git commit. Если хук падает — коммит отменяется,
# нужно исправить и закоммитить снова.
#
# P1.5: эти же хуки запускаются в CI lint job (см. .github/workflows/ci.yml),
# поэтому обход хука локально через --no-verbose всё равно будет пойман в CI.

repos:
  # ─── Базовые проверки ───
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^data/|^derived/|^runtime/|^setup/'
      - id: end-of-file-fixer
        exclude: '^data/|^derived/|^runtime/|^setup/'
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
        exclude: '^data/|^derived/|^runtime/|^setup/|\.vscode/'
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
        exclude: '^data/|^derived/|^runtime/|^download/'
      - id: debug-statements
      # P1.3: requirements-txt-fixer удалён — мы перешли на pyproject-only модель

  # ─── Commitlint (conventional commits) ───
  # P3.2: проверка формата коммитов
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']

  # ─── detect-secrets (S8.6 — 2026-07-05) ───
  # Предотвращает accidental commits секретов (токены, пароли, ключи).
  # Baseline: .secrets.baseline (существующие false positives помечены как known)
  # Обновление baseline: detect-secrets scan --baseline .secrets.baseline
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: '^data/|^derived/|^runtime/|^tools/|^download/|^experimental/'

  # ─── Ruff (lint + format) ───
  # Заменяет flake8 + black + isort одним инструментом
  # P1.5: версия ruff в pre-commit должна совпадать с локальной и CI
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7  # P2.x: обновить до v0.8+ когда mypy strict
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(src|tests|scripts)/.*\.py$
      - id: ruff-format
        files: ^(src|tests|scripts)/.*\.py$

  # ─── Mypy (type checking) ───
  # Только на src/ — scripts/ и tests/ слишком динамичные
  # P2.8: mypy пока non-strict (145 ошибок на постепенное исправление)
  # В CI mypy запускается отдельно с continue-on-error: true
  # В pre-commit тоже non-blocking через stages: [manual]
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.1
    hooks:
      - id: mypy
        files: ^src/.*\.py$
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - types-PyYAML
          - pytest
          - structlog
          - mcp
          - networkx
        # P2.8: mypy запускается вручную (pre-commit run --hook-stage manual mypy)
        # В CI mypy уже запущен отдельно с continue-on-error
        stages: [manual]

  # ─── Pytest (быстрый smoke) ───
  # Ключевые тесты (без benchmarks, e2e, integration с реальными данными)
  # Эти тесты гарантируют: нельзя закоммитить код, который ломает core-функциональность
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast subset)
        entry: python -m pytest
        args:
          - tests/test_config_manager.py
          - tests/test_path_manager.py
          - tests/test_task_processor.py
          - tests/test_sarif_reporter.py
          - tests/test_mcp_server.py
          - tests/test_mcp_tools_sync.py
          - tests/test_configuration.py
          - tests/test_solve.py
          - tests/test_exceptions.py
          - tests/test_search_code.py
          - -q
          - --no-header
          - --tb=short
          - --benchmark-disable
        language: system
        types: [python]
        pass_filenames: false
        stages: [commit]
      # P1.2: проверка синхронизации MCP tools (blocking в pre-commit)
      - id: mcp-tools-sync
        name: MCP tools sync check
        entry: python scripts/check_mcp_count.py
        language: system
        files: ^(src/mcp_server\.py|scripts/check_mcp_count\.py|manifest\.json|README\.md|docs/MCP_INTEGRATION\.md|AGENTS\.md)$
        pass_filenames: false
        stages: [commit]
